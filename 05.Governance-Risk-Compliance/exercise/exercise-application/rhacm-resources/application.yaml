---
apiVersion: v1
kind: Namespace
metadata:
  name: mariadb-metrics
---
apiVersion: cluster.open-cluster-management.io/v1beta2
kind: ManagedClusterSetBinding
metadata:
  name: all-clusters
  namespace: mariadb-metrics
spec:
  clusterSet: all-clusters
---
apiVersion: apps.open-cluster-management.io/v1
kind: Channel
metadata:
  name: mariadb-metrics
  namespace: mariadb-metrics
spec:
  type: Git
  pathname: https://github.com/tosin2013/rhacm-workshop.git 
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: prod-clusters
  namespace: mariadb-metrics
spec:
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchLabels:
            environment: dev
---
apiVersion: apps.open-cluster-management.io/v1
kind: Subscription
metadata:
  name: mariadb-metrics
  namespace: mariadb-metrics
  labels:
    app: mariadb-metrics
  annotations:
    apps.open-cluster-management.io/github-path: 05.Governance-Risk-Compliance/exercise/exercise-application/application-resources
    apps.open-cluster-management.io/git-branch: master
spec:
  channel: mariadb-metrics/mariadb-metrics
  placement:
    placementRef:
      kind: Placement
      name: prod-clusters
---
apiVersion: app.k8s.io/v1beta1
kind: Application
metadata:
  name: mariadb-metrics
  namespace: mariadb-metrics
spec:
  componentKinds:
  - group: apps.open-cluster-management.io
    kind: Subscription
  descriptor: {}
  selector:
    matchExpressions:
    - key: app
      operator: In
      values:
      - mariadb-metrics
