kind: Namespace
metadata:
  name: mcp
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-viewer
  namespace: mcp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-viewer-cluster-reader
roleRef:
