---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: lightspeed-mcp
  namespace: openshift-lightspeed
spec:
  to:
    kind: Service
    name: lightspeed-mcp-server
    weight: 100
  port:
    targetPort: mcp
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
